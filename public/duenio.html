
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <h2>Registrar Administrador</h2>

        <form id="form-admin">

            <input class="form-control mb-2" placeholder="Nombre completo" id="nombre">
            <select class="form-select mb-2" name="tipo_documento" id="tipo_documento">
                <option value="ti">TI</option>
                <option value="cc">CC</option>
                <option value="ppt">PPT</option>
            </select>
            <input class="form-control mb-2" placeholder="Número documento" id="num_documento">
            <input class="form-control mb-2" placeholder="Email" id="email">
            <input class="form-control mb-2" placeholder="Teléfono" id="telefono">
            <input class="form-control mb-2" placeholder="Usuario" id="usuario">
            <input class="form-control mb-2" placeholder="Password" id="password">

            <button class="btn btn-success">Registrar</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="js/admin.js"></script>
</body>

</html>
