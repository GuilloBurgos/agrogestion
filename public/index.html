<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgroGestión360 - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f4f7f6;
            font-family: 'Quicksand', sans-serif;
        }
        .login-card {
            background: white;
            border-top: 5px solid #2d6a4f; /* Verde bosque */
        }
        .btn-agro {
            background-color: #2d6a4f;
            border-color: #2d6a4f;
            color: white;
        }
        .btn-agro:hover {
            background-color: #1b4332;
            color: white;
        }
        .text-agro {
            color: #2d6a4f;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row d-flex justify-content-center align-items-center vh-100">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4 login-card p-4 shadow-lg rounded-3">
                
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-agro mb-0">AgroGestión360</h1>
                    <small class="text-muted">Control integral de tu producción</small>
                </div>

                <h2 class="text-secondary fs-5 mb-4 text-center">Inicio de Sesión</h2>
                
                <form action="" id="form-login">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Usuario" required>
                        <label for="usuario">Usuario / Correo</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                        <label for="password">Contraseña</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-agro btn-lg" type="submit">Ingresar al Sistema</button>
                    </div>

                    <p class="mt-4 text-center">
                        <a href="#" class="text-decoration-none text-agro" data-bs-toggle="modal" data-bs-target="#modalRecuperar">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </p>
                </form>

                <div class="modal fade" id="modalRecuperar" tabindex="-1" aria-labelledby="modalRecuperarLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                            <div class="modal-header bg-light">
                                <h5 class="modal-title" id="modalRecuperarLabel">Recuperar acceso</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body p-4">
                                <p class="text-muted small">Ingresa tu correo electrónico registrado y te enviaremos las instrucciones para restablecer tu cuenta.</p>
                                <div class="mb-3">
                                    <label for="emailRecuperar" class="form-label">Correo electrónico</label>
                                    <input type="email" id="emailRecuperar" class="form-control" placeholder="ejemplo@finca.com">
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-agro" id="btnRecuperar">Enviar enlace de recuperación</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
