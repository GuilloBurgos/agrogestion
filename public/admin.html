<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgroGestión - Panel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .nav-link { color: #adb5bd; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; background-color: #0d6efd; }
        .card { border: none; shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <div class="d-flex align-items-center mb-4 px-2">
                    <i class="bi bi-leaf-fill text-success fs-3 me-2"></i>
                    <span class="text-white fs-4 fw-bold">AgroGestión</span>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active mb-2 rounded" href="#"><i class="bi bi-people-fill me-2"></i> Gestión Trabajadores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#"><i class="bi bi-piggy-bank me-2"></i> Módulo Pecuario</a>
                    </li>
                    <hr class="text-secondary">
                    <li class="nav-item">
                        <a class="nav-link text-danger mb-2 rounded" href="index.html"><i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestión de Trabajadores</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="badge bg-primary p-2"><i class="bi bi-person-circle"></i> Admin: Guillermo</span>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card p-3 bg-white text-dark border-start border-primary border-4">
                            <h6 class="text-muted">Total Trabajadores</h6>
                            <h3 class="fw-bold">12</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 bg-white text-dark border-start border-success border-4">
                            <h6 class="text-muted">Activos Hoy</h6>
                            <h3 class="fw-bold">8</h3>
                        </div>
                    </div>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white py-3">
                                <h5 class="mb-0 text-primary fw-bold"><i class="bi bi-person-plus me-2"></i>Registrar Nuevo Trabajador</h5>
                            </div>
                            <div class="card-body p-4">
                                <form id="form-trabajador" class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Nombre completo</label>
                                        <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Tipo documento</label>
                                        <select class="form-select" id="tipo_documento" required>
                                            <option value="" selected disabled>Seleccione...</option>
                                            <option value="CC">Cédula</option>
                                            <option value="TI">Tarjeta de identidad</option>
                                            <option value="CE">Cédula de extranjería</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Número documento</label>
                                        <input type="text" class="form-control" id="numero_documento">
                                    </div>

                                    <div class="col-md-4">
                                        <label class="form-label">Tipo de Trabajo</label>
                                        <select class="form-select" id="id_tipo_trabajo">
                                            
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Teléfono</label>
                                        <input type="text" class="form-control" id="telefono">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Teléfono familiar</label>
                                        <input type="text" class="form-control" id="telefono_familiar">
                                    </div>

                                    <div class="col-md-8">
                                        <label class="form-label">Dirección</label>
                                        <input type="text" class="form-control" id="direccion">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Fecha de ingreso</label>
                                        <input type="date" class="form-control" id="fecha_ingreso">
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Observaciones</label>
                                        <textarea class="form-control" rows="2" id="observaciones"></textarea>
                                    </div>

                                    <div class="col-12 text-end mt-4">
                                        <button type="reset" class="btn btn-outline-secondary me-2">Limpiar</button>
                                        <button type="submit" class="btn btn-primary px-4">
                                            <i class="bi bi-save me-2"></i>Registrar Trabajador
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/trabajador.js"></script>
</body>

</html>
