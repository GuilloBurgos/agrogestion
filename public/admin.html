<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgroGestión - Panel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #212529;
        }

        .nav-link {
            color: #adb5bd;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
        }

        .card {
            border: none;
            shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <div class="d-flex align-items-center mb-4 px-2">
                    <i class="bi bi-leaf-fill text-success fs-3 me-2"></i>
                    <span class="text-white fs-4 fw-bold">AgroGestión</span>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#" id="btn-dashboard"><i
                                class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#" id="btn-trabajadores"><i
                                class="bi bi-people-fill me-2"></i> Gestión Trabajadores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#" id="btn-inventario"><i
                                class="bi bi-box-seam me-2"></i> Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#" id="btn-ganaderia"><i
                                class="bi bi-piggy-bank me-2"></i> Módulo Pecuario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mb-2 rounded" href="#" data-bs-toggle="modal" data-bs-target="#modalPerfil">
                            <i class="bi bi-person"></i> Mi perfil
                        </a>
                    </li>

                    <hr class="text-secondary" />
                    <li class="nav-item">
                        <a class="nav-link text-danger mb-2 rounded" href="#" id="btnLogout"><i
                                class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestión de Trabajadores</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="badge bg-primary p-2"><i class="bi bi-person-circle"></i>Admin:<span
                                id="nombreAdmin"></span></span>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card p-3 bg-white text-dark border-start border-primary border-4">
                            <h6 class="text-muted">Total Trabajadores</h6>
                            <h3 class="fw-bold" id="totalTrabajadores">0</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3 bg-white text-dark border-start border-success border-4">
                            <h6 class="text-muted">Activos Hoy</h6>
                            <h3 class="fw-bold" id="trabajadoresActivos">0</h3>
                        </div>
                    </div>
                </div>
                <div id="contenido-principal"></div><!--Contenido principal-->
            </main>

        </div>
    </div>

    <!--Modal de actualizacion de datos-->
    <div class="modal fade" id="modalPerfil" tabindex="-1" aria-labelledby="modalPerfilLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalPerfilLabel">
                        <i class="bi bi-person-circle me-2"></i>Actualizar Mis Datos
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-update-perfil">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email Corporativo</label>
                            <input type="email" class="form-control" id="perfil-email" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Teléfono de Contacto</label>
                            <input type="text" class="form-control" id="perfil-telefono" />
                        </div>
                        <hr />
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Nueva Contraseña (dejar en blanco para no
                                cambiar)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" class="form-control" id="perfil-password"
                                    placeholder="********" />
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!--Fin de modal de actualizacion de datos-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/trabajador.js"></script>
    <script src="js/panel.js"></script>
    <script src="js/ganaderia.js"></script>
</body>

</html>
