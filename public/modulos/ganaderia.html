<div class="tab-content mt-4">
    <!--Pestaña de registro de animales-->
    <div class="tab-pane fade show active" id="animales">
        <div class="card shadow-sm border-start border-warning border-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-warning fw-bold"><i class="bi bi-plus-circle me-2"></i>Nuevo
                    Registro de Animal</h5>
            </div>
            <div class="card-body p-4">
                <form id="form-animal" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">ID / Arete</label>
                        <input type="text" class="form-control" id="codigo_arete" placeholder="Ej: AN-001" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Especie</label>
                        <select class="form-select" id="especie" required>
                            <option value="Bovino">Bovino</option>
                            <option value="Porcino">Porcino</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Raza</label>
                        <select class="form-select" id="raza"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Género</label>
                        <div class="mt-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="genero" value="M">
                                <label class="form-check-label">Macho</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="genero" value="F">
                                <label class="form-check-label">Hembra</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Origen</label>
                        <select class="form-select" id="origen">
                            <option value="NACIMIENTO">Nacimiento</option>
                            <option value="COMPRA">Compra</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Fecha Nacimiento</label>
                        <input type="date" class="form-control" id="fecha_nacimiento">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Fecha Ingreso</label>
                        <input type="date" class="form-control" id="fecha_ingreso">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Peso Inicial (Kg)</label>
                        <input type="number" class="form-control" id="peso_inicial">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observaciones"></textarea>
                    </div>

                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-warning px-4 fw-bold">
                            <i class="bi bi-save me-2"></i>Registrar Animal
                        </button>
                    </div>
                </form>


                <div class="card shadow-sm border-0 mt-4">
                    <div class="card-header bg-white">
                        <h5 class="text-warning">Animales Registrados</h5>
                    </div>

                    <div class="card-body">
                        <table class="table table-striped mt-4">
                            <thead>
                                <tr>
                                    <th>Arete</th>
                                    <th>Especie</th>
                                    <th>Raza</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-animales"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!---Cierre de pestaña de registro de animales-->

        <h5>Registro de pesajes</h5>
       
            <div class="card shadow-sm border-start border-primary border-4">

                <div class="card-header bg-white">
                    <h5 class="fw-bold text-primary">
                        <i class="bi bi-activity"></i> Registro de Pesaje
                    </h5>
                </div>

                <div class="card-body">

                    <form id="form-pesaje" class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label">Animal</label>
                            <select class="form-select" id="id_animal_peso">
                                <option>Seleccionar animal</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Fecha Pesaje</label>
                            <input type="date" class="form-control" id="fecha_pesaje">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Peso (Kg)</label>
                            <input type="number" class="form-control" id="peso">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" id="obs_peso"></textarea>
                        </div>

                        <div class="col-12 text-end">
                            <button class="btn btn-primary">
                                <i class="bi bi-save"></i> Registrar Peso
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        

    </div>
