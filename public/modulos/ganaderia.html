            <div class="card-body p-4">
        <form id="form-animal" class="row g-3">

                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" value="F">
                        <label class="form-check-label">Hembra</label>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Fecha Nacimiento</label>
                <input type="date" class="form-control" id="fecha_nacimiento">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Peso Inicial (Kg)</label>
                <input type="number" class="form-control" id="peso">
            </div>
            <div class="col-12 text-end">
                <button type="submit" class="btn btn-warning px-4 fw-bold">
                    <i class="bi bi-save me-2"></i>Registrar Animal

        </form>
